# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:trojans}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload-dir=${UPLOAD_DIR:./uploads}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:trojans-super-secret-key-change-in-production-very-long-key-required}
app.jwt.expiration=86400000

# CORS Configuration
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,https://trojans-rugby-hub.vercel.app}

# Logging
logging.level.com.trojans=DEBUG
logging.level.org.springframework.security=INFO