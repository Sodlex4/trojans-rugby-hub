# Server Configuration
server.port=8080

# Database - Using SQLite for local development
spring.datasource.url=jdbc:sqlite:trojans.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload-dir=${UPLOAD_DIR:./uploads}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:trojans-super-secret-key-change-in-production-very-long-key-required}
app.jwt.expiration=86400000

# CORS Configuration
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,https://trojans-rugby-hub.vercel.app}

# Logging
logging.level.com.trojans=DEBUG
logging.level.org.springframework.security=INFO