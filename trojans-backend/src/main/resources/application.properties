# Server Configuration
server.port=8080

# Database - Supports MySQL, MariaDB (via env vars), or SQLite (default)
spring.datasource.url=${DB_URL:jdbc:sqlite:trojans.db}
spring.datasource.username=${DB_USER:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.sqlite.JDBC}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# JPA Database Platform (auto-detected, but can be set via DB_PLATFORM env var)
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.spatial.dialect.SQLiteDialect}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload-dir=${UPLOAD_DIR:./uploads}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:trojans-super-secret-key-change-in-production-very-long-key-required}
app.jwt.expiration=86400000

# CORS Configuration
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,https://trojans-rugby-hub.vercel.app}

# Logging
logging.level.com.trojans=DEBUG
logging.level.org.springframework.security=INFO